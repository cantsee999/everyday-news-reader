name: Update daily news

on:
  workflow_dispatch:
  schedule:
    # 07:00 China Standard Time = 23:00 UTC on the previous day.
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate news cache
        run: node scripts/update-news.mjs

      - name: Commit updated cache
        run: |
          if git diff --quiet -- data/news.json data/news-data.js; then
            echo "No news cache changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news-data.js
          git commit -m "Update daily news cache"
          git push
